name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Android project layout
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ -x "android/gradlew" ]]; then
            echo "android_dir=android" >> "$GITHUB_OUTPUT"
            if [[ -f "package.json" ]]; then
              echo "node_package_dir=." >> "$GITHUB_OUTPUT"
            else
              echo "node_package_dir=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [[ -x "mobile/android/gradlew" ]]; then
            echo "android_dir=mobile/android" >> "$GITHUB_OUTPUT"
            if [[ -f "mobile/package.json" ]]; then
              echo "node_package_dir=mobile" >> "$GITHUB_OUTPUT"
            elif [[ -f "package.json" ]]; then
              echo "node_package_dir=." >> "$GITHUB_OUTPUT"
            else
              echo "node_package_dir=" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "::error::Android Gradle wrapper not found. Expected android/gradlew or mobile/android/gradlew."
          echo "::error::Add native React Native Android project files before running this workflow."
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            **/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Node modules
        if: ${{ steps.detect.outputs.node_package_dir != '' }}
        uses: actions/cache@v4
        with:
          path: ${{ steps.detect.outputs.node_package_dir }}/node_modules
          key: ${{ runner.os }}-node-modules-${{ steps.detect.outputs.node_package_dir }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install JavaScript dependencies
        if: ${{ steps.detect.outputs.node_package_dir != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.detect.outputs.node_package_dir }}"
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.detect.outputs.android_dir }}"
          chmod +x ./gradlew
          ./gradlew --no-daemon clean assembleDebug --stacktrace

      - name: Verify APK exists
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="${{ steps.detect.outputs.android_dir }}/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK_PATH" || { echo "::error::Debug APK not found at $APK_PATH"; exit 1; }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          if-no-files-found: error
          path: |
            ${{ steps.detect.outputs.android_dir }}/app/build/outputs/apk/debug/app-debug.apk
