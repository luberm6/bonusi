services:
  - type: web
    name: autoservice-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate && npm run bootstrap:super-admin && npm run start
    healthCheckPath: /api/v1/readyz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autoservice-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: SESSION_SALT
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: TRUST_PROXY
        value: true
      - key: CORS_ORIGIN
        value: https://autoservice-web.onrender.com,http://localhost:3000,http://127.0.0.1:3100
      - key: FILES_ENABLED
        value: false
      - key: PUSH_ENABLED
        value: false
      - key: SMTP_ENABLED
        value: false
      - key: NOMINATIM_BASE_URL
        value: https://nominatim.openstreetmap.org
      - key: NOMINATIM_USER_AGENT
        value: autoservice-backend/1.0 (internal-autoservice)
      - key: NOMINATIM_TIMEOUT_MS
        value: 7000
      - key: GEOCODE_CACHE_TTL_DAYS
        value: 30
      - key: SUPER_ADMIN_EMAIL
        value: luberm6@gmail.com
      - key: SUPER_ADMIN_PASSWORD
        generateValue: true
      - key: SUPER_ADMIN_NAME
        value: System Super Admin
      - key: FCM_SERVER_KEY
        value: ""
      - key: S3_ENDPOINT
        value: ""
      - key: S3_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: ""
      - key: S3_ACCESS_KEY_ID
        value: ""
      - key: S3_SECRET_ACCESS_KEY
        value: ""
      - key: S3_PUBLIC_BASE_URL
        value: ""

  - type: web
    env: static
    name: autoservice-web
    rootDir: web
    buildCommand: ./scripts/build-static.sh
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    envVars:
      - key: PUBLIC_API_BASE
        value: https://autoservice-backend-atyj.onrender.com

databases:
  - name: autoservice-postgres
    plan: free
    databaseName: autoservice
    user: autoservice
