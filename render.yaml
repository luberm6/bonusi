services:
  - type: web
    name: autoservice-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate && npm run bootstrap:super-admin && npm run start
    healthCheckPath: /api/v1/readyz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autoservice-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: SESSION_SALT
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: TRUST_PROXY
        value: true
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: autoservice-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_EXTRA_ORIGINS
        value: ""
      - key: FILES_ENABLED
        value: true
      - key: PUSH_ENABLED
        value: false
      - key: SMTP_ENABLED
        value: false
      - key: NOMINATIM_BASE_URL
        value: https://nominatim.openstreetmap.org
      - key: NOMINATIM_USER_AGENT
        value: autoservice-backend/1.0 (internal-autoservice)
      - key: NOMINATIM_TIMEOUT_MS
        value: 7000
      - key: GEOCODE_CACHE_TTL_DAYS
        value: 30
      - key: SUPER_ADMIN_EMAIL
        value: luberm6@gmail.com
      - key: SUPER_ADMIN_PASSWORD
        generateValue: true
      - key: SUPER_ADMIN_NAME
        value: System Super Admin
      - key: FCM_SERVER_KEY
        value: ""
      - key: S3_ENDPOINT
        value: ""
      - key: S3_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: ""
      - key: S3_ACCESS_KEY_ID
        value: ""
      - key: S3_SECRET_ACCESS_KEY
        value: ""
      - key: S3_PUBLIC_BASE_URL
        value: ""
      - key: SMS_PROVIDER
        value: smsaero
      - key: SMS_OTP_ENABLED
        value: true
      - key: SMS_OTP_LENGTH
        value: 6
      - key: SMS_OTP_TTL_SECONDS
        value: 300
      - key: SMS_OTP_RESEND_SECONDS
        value: 60
      - key: SMS_OTP_MAX_ATTEMPTS
        value: 5
      - key: SMSAERO_EMAIL
        value: ""
      - key: SMSAERO_API_KEY
        value: ""
      - key: SMSAERO_SENDER
        value: "SMS Aero"
      - key: SMSAERO_ENDPOINT
        value: https://gate.smsaero.ru/v2/sms/send
      - key: SMSAERO_DEBUG
        value: false
      - key: TEST_SMS_ENABLED
        value: false
      - key: TEST_SMS_PHONE
        value: "+79990000000"
      - key: TEST_SMS_CODE
        value: "123456"

  - type: web
    env: static
    name: autoservice-web
    rootDir: web
    buildCommand: ./scripts/build-static.sh
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Keep this linked to the backend service host. Do not override manually in Render UI.
      - key: PUBLIC_API_BASE
        value: https://autoservice-backend-atyj.onrender.com/api/v1
      # Must match backend FILES_ENABLED so web admin shows/hides the attach button correctly.
      - key: FILES_ENABLED
        value: true

databases:
  - name: autoservice-postgres
    plan: basic-256mb
    databaseName: autoservice
    user: autoservice
