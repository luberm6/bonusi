<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Личный кабинет</title>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <header class="glass card nav">
          <div>
            <h1 class="title" style="font-size: 22px; margin-bottom: 4px;">Личный кабинет</h1>
            <p id="who" class="subtitle"></p>
          </div>
          <div class="nav-links">
            <button id="logout-btn" class="btn btn-secondary" type="button">Выйти</button>
          </div>
        </header>

        <div class="spacer-16"></div>
        <section class="grid">
          <article class="glass kpi">
            <h3>Бонусный баланс</h3>
            <p id="kpi-bonus">—</p>
          </article>
          <article class="glass kpi">
            <h3>Последний визит</h3>
            <p id="kpi-last-visit">—</p>
          </article>
          <article class="glass kpi">
            <h3>Статус аккаунта</h3>
            <p><span class="badge">Активный</span></p>
          </article>
        </section>

      </section>
    </main>

    <script type="module">
      import { guard, bindLogout, startSessionAutoRefresh, authFetchJson } from "/assets/app.js";
      const session = guard(["client"]);
      if (session) {
        document.getElementById("who").textContent = `${session.email} (${session.role})`;
        startSessionAutoRefresh();
        bindLogout("logout-btn");

        const [bonusRes, visitsRes] = await Promise.allSettled([
          authFetchJson(`/bonuses/balance?clientId=${session.userId}`),
          authFetchJson(`/visits?clientId=${session.userId}`)
        ]);

        if (bonusRes.status === "fulfilled") {
          const b = bonusRes.value;
          document.getElementById("kpi-bonus").textContent =
            typeof b.balance === "number" ? `${b.balance} ₽` : "—";
        }

        if (visitsRes.status === "fulfilled" && Array.isArray(visitsRes.value) && visitsRes.value.length > 0) {
          const visits = visitsRes.value;
          visits.sort((a, b) => new Date(b.visitDate) - new Date(a.visitDate));
          const d = new Date(visits[0].visitDate);
          document.getElementById("kpi-last-visit").textContent =
            d.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" });
        } else {
          document.getElementById("kpi-last-visit").textContent = "Визитов пока нет";
        }
      }
    </script>
  </body>
</html>
