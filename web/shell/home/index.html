<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Личный кабинет CRS</title>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="page">
      <div id="weather-widget" class="weather-widget">
        <span class="weather-icon">☁️</span>
        <span class="weather-temp">--°C</span>
      </div>
      <section class="shell client-shell">
        <div id="app" class="client-stack"></div>
      </section>
    </main>

    <script type="module">
      async function updateWeather() {
        try {
          // Saint Petersburg coordinates
          const lat = 59.9343;
          const lon = 30.3351;
          const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
          const data = await response.json();
          
          if (data && data.current_weather) {
            const temp = Math.round(data.current_weather.temperature);
            const code = data.current_weather.weathercode;
            
            // Basic weather code mapping
            let icon = "☀️";
            if (code >= 1 && code <= 3) icon = "🌤️";
            if (code >= 45 && code <= 48) icon = "🌫️";
            if (code >= 51 && code <= 67) icon = "🌧️";
            if (code >= 71 && code <= 86) icon = "❄️";
            if (code >= 95) icon = "⛈️";
            
            document.querySelector(".weather-icon").textContent = icon;
            document.querySelector(".weather-temp").textContent = `${temp > 0 ? '+' : ''}${temp}°C`;
          }
        } catch (error) {
          console.error("Weather fetch failed:", error);
        }
      }

      updateWeather();
    </script>
    <script type="module" src="/assets/client-home.js"></script>
  </body>
</html>
