<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
    </style>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css?v=10" />
  </head>
  <body>
    <main class="page">
      <div id="weather-widget" class="weather-widget">
        <span class="weather-icon">☁️</span>
        <span class="weather-temp">--°C</span>
      </div>
      <section class="shell client-shell">
        <div id="app" class="client-stack"></div>
      </section>
    </main>

    <script type="module">
      import { getApiBase } from "/assets/app.js";

      async function updateWeather() {
        try {
          const response = await fetch(`${getApiBase()}/weather/spb`);
          if (!response.ok) return;
          const data = await response.json();
          
          if (data && typeof data.temperatureC === "number") {
            const temp = data.temperatureC;
            const iconMap = {
              sun: "☀️",
              cloud: "🌤️",
              overcast: "☁️",
              fog: "🌫️",
              rain: "🌧️",
              snow: "❄️",
              storm: "⛈️"
            };
            const icon = iconMap[data.icon] || "☁️";
            
            const iconEl = document.querySelector(".weather-icon");
            const tempEl = document.querySelector(".weather-temp");
            if (iconEl) iconEl.textContent = icon;
            if (tempEl) tempEl.textContent = `${temp > 0 ? '+' : ''}${temp}°C`;
          }
        } catch (error) {
          console.error("Weather fetch failed:", error);
        }
      }

      updateWeather();
    </script>
    <script type="module" src="/assets/client-home.js"></script>
  </body>
</html>
