<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Диалоги</title>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      .unread-badge { background: #ef4444; color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 11px; margin-left: 6px; }
      #no-conv { color: #94a3b8; padding: 20px; text-align: center; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell workspace-shell">
        <header class="glass card nav workspace-header">
          <div class="workspace-header-copy">
            <p class="workspace-eyebrow">Коммуникации</p>
            <h1 class="workspace-title">Диалоги</h1>
            <p class="subtitle">Рабочее пространство переписки с клиентами и быстрых ответов.</p>
          </div>
          <div class="nav-links">
            <a class="link" href="/admin/dashboard/">← В центр управления</a>
          </div>
        </header>

        <div class="spacer-16"></div>
        <section class="workspace-panel" id="chat-state">
          <div class="workspace-state">
            <div class="workspace-state-copy">
              <p class="workspace-state-title">Загружаем диалоги</p>
              <p class="workspace-state-text">Подготавливаем список обращений и историю сообщений.</p>
            </div>
            <span class="badge badge-soft">Чат</span>
          </div>
        </section>

        <div class="spacer-16"></div>
        <div class="workspace-panel">
          <div class="workspace-chat">
            <aside class="workspace-chat-sidebar">
              <div class="workspace-toolbar">
                <div>
                  <h2 class="workspace-section-title">Список диалогов</h2>
                  <p class="workspace-section-meta">Текущие обращения клиентов и новые сообщения.</p>
                </div>
              </div>
              <div class="workspace-chat-list" id="conv-list">
                <div class="workspace-chat-item workspace-skeleton" style="min-height:76px;"></div>
                <div class="workspace-chat-item workspace-skeleton" style="min-height:76px;"></div>
                <div class="workspace-chat-item workspace-skeleton" style="min-height:76px;"></div>
              </div>
            </aside>
            <div class="workspace-chat-panel" id="chat-panel">
              <div id="no-conv" class="workspace-panel workspace-panel-compact">Выберите диалог слева</div>
            </div>
          </div>
        </div>
        <div id="toast" class="workspace-toast"></div>
      </section>
    </main>

    <script type="module">
      import { guard, startSessionAutoRefresh, authFetchJson } from "/assets/app.js";
      const session = guard(["admin", "super_admin"]);
      if (session) {
        startSessionAutoRefresh();

        const chatState = document.getElementById("chat-state");
        const toast = document.getElementById("toast");
        let toastTimer = null;
        let activeConvId = null;
        let activeConv = null;
        const showToast = (text, tone = "success") => {
          toast.textContent = text;
          toast.className = `workspace-toast ${tone} show`;
          window.clearTimeout(toastTimer);
          toastTimer = window.setTimeout(() => {
            toast.className = "workspace-toast";
          }, 2200);
        };
        const renderState = (tone, title, text, badge = "Чат") => {
          chatState.innerHTML = `
            <div class="workspace-state" data-tone="${tone}">
              <div class="workspace-state-copy">
                <p class="workspace-state-title">${title}</p>
                <p class="workspace-state-text">${text}</p>
              </div>
              <span class="badge ${tone === "error" ? "badge-danger" : tone === "success" ? "" : "badge-soft"}">${badge}</span>
            </div>
          `;
        };

        function fmt(iso) {
          if (!iso) return "";
          const d = new Date(iso);
          return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
        }

        function renderConversationPreview(conv) {
          const lastMessage = conv.lastMessage?.text || "Сообщений пока нет";
          const lastAt = conv.lastMessage?.createdAt ? ` · ${fmt(conv.lastMessage.createdAt)}` : "";
          return `${lastMessage}${lastAt}`;
        }

        async function loadConversations() {
          renderState("default", "Загружаем диалоги", "Синхронизируем обращения и последние сообщения.");
          const el = document.getElementById("conv-list");
          try {
            const list = await authFetchJson("/chat/conversations");
            el.innerHTML = "";
            if (!list.length) {
              renderState("default", "Диалогов пока нет", "Когда появится первое обращение, оно отобразится в рабочем списке.");
              el.innerHTML = '<div class="workspace-panel workspace-panel-compact"><p class="workspace-empty">Диалогов пока нет.</p></div>';
              document.getElementById("chat-panel").innerHTML = '<div id="no-conv" class="workspace-panel workspace-panel-compact">Диалогов пока нет. Когда появится первый, он отобразится здесь.</div>';
              return;
            }
            renderState("success", "Диалоги синхронизированы", "Список обращений получен из backend и готов к работе.", "Актуально");
            for (const c of list) {
              const div = document.createElement("div");
              div.className = "workspace-chat-item" + (c.id === activeConvId ? " active" : "");
              div.dataset.id = c.id;
              const badge = c.unreadCount > 0 ? `<span class="unread-badge">${c.unreadCount}</span>` : "";
              div.innerHTML = `
                <div class="workspace-chat-name">${c.participantId || "Клиент"}${badge}</div>
                <div class="workspace-chat-preview">${renderConversationPreview(c)}</div>
              `;
              div.addEventListener("click", () => openConv(c));
              el.appendChild(div);
            }
            if (!activeConvId && list[0]) {
              await openConv(list[0]);
            }
          } catch (error) {
            renderState("error", "Не удалось загрузить диалоги", error instanceof Error ? error.message : "Не удалось загрузить диалоги", "Ошибка");
            el.innerHTML = '<div class="workspace-panel workspace-panel-compact"><p class="workspace-empty">Не удалось загрузить диалоги.</p></div>';
            document.getElementById("chat-panel").innerHTML = '<div id="no-conv" class="workspace-panel workspace-panel-compact">Не удалось открыть диалог.</div>';
            showToast(error instanceof Error ? error.message : "Не удалось загрузить диалоги", "error");
          }
        }

        async function openConv(convOrId) {
          const convId = typeof convOrId === "string" ? convOrId : convOrId.id;
          activeConvId = convId;
          activeConv = typeof convOrId === "string" ? activeConv : convOrId;
          document.querySelectorAll(".workspace-chat-item").forEach(el => {
            el.classList.toggle("active", el.dataset.id === convId);
          });

          const panel = document.getElementById("chat-panel");
          panel.innerHTML = '<div class="workspace-panel workspace-panel-compact"><p class="workspace-empty">Открываем диалог...</p></div>';

          try {
            const messages = await authFetchJson(`/chat/conversations/${convId}/messages`);
            const myId = session.userId;

            panel.innerHTML = `
              <div class="workspace-chat-board">
                <div class="workspace-chat-messages" id="msgs"></div>
                <div class="workspace-chat-compose">
                  <textarea id="msg-text" class="input" rows="2" placeholder="Введите сообщение..."></textarea>
                  <button class="btn btn-primary" id="send-btn" style="align-self:flex-end">Отправить</button>
                </div>
              </div>
            `;

            const msgsEl = document.getElementById("msgs");
            if (!messages.length) {
              msgsEl.innerHTML = '<p class="workspace-empty">Сообщений пока нет. Начните диалог первым.</p>';
            } else {
              for (const m of messages) {
                const mine = m.senderId === myId;
                const div = document.createElement("div");
                div.className = "workspace-msg " + (mine ? "mine" : "other");
                div.innerHTML = `${m.text || ""}<div class="workspace-msg-meta">${fmt(m.createdAt)}</div>`;
                msgsEl.appendChild(div);
              }
              msgsEl.scrollTop = msgsEl.scrollHeight;
            }

            document.getElementById("send-btn").addEventListener("click", async () => {
              const text = document.getElementById("msg-text").value.trim();
              if (!text) return;
              document.getElementById("msg-text").value = "";
              const clientMessageId = crypto.randomUUID();
              const btn = document.getElementById("send-btn");
              btn.disabled = true;
              try {
                await authFetchJson(`/chat/conversations/${convId}/messages`, {
                  method: "POST",
                  body: { clientMessageId, text }
                });
                showToast("Сообщение отправлено");
                await loadConversations();
                await openConv(convId);
              } catch (error) {
                showToast(error instanceof Error ? error.message : "Не удалось отправить сообщение", "error");
              } finally {
                btn.disabled = false;
              }
            });

            document.getElementById("msg-text").addEventListener("keydown", (e) => {
              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                document.getElementById("send-btn").click();
              }
            });
          } catch (error) {
            panel.innerHTML = `<div class="workspace-panel workspace-panel-compact"><p class="error">${error instanceof Error ? error.message : "Не удалось открыть диалог"}</p></div>`;
            showToast(error instanceof Error ? error.message : "Не удалось открыть диалог", "error");
          }
        }

        loadConversations();
      }
    </script>
  </body>
</html>
