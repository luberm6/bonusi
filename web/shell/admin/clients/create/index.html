<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Новый клиент</title>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      textarea.input { min-height: 120px; resize: vertical; }
      #error-msg { color: #dc2626; font-size: 14px; min-height: 20px; }
      #success-msg { color: #16a34a; font-size: 15px; font-weight: 600; min-height: 20px; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell workspace-shell">
        <header class="glass card nav workspace-header">
          <div class="workspace-header-copy">
            <p class="workspace-eyebrow">Создание записи</p>
            <h1 class="workspace-title">Новый клиент</h1>
            <p class="subtitle">Создайте учетную запись клиента и заполните основные контактные данные.</p>
          </div>
          <div class="nav-links">
            <a class="link" href="/admin/clients/">Клиенты</a>
            <a class="link" href="/admin/dashboard/">← Дашборд</a>
          </div>
        </header>

        <div class="spacer-16"></div>
        <section class="workspace-panel">
          <div class="workspace-state" data-tone="default">
            <div class="workspace-state-copy">
              <p class="workspace-state-title">Готово к созданию клиента</p>
              <p class="workspace-state-text">После сохранения карточка сразу появится в рабочем списке клиентов.</p>
            </div>
            <span class="badge badge-soft">Новая запись</span>
          </div>
        </section>

        <div class="spacer-16"></div>
        <section class="workspace-panel">
          <form id="client-form">
            <div class="workspace-form-grid">
              <div class="workspace-field">
                <label for="full-name">Имя клиента</label>
                <input class="input" id="full-name" type="text" placeholder="Например, Иван Петров" />
              </div>
              <div class="workspace-field">
                <label for="email">Электронная почта</label>
                <input class="input" id="email" type="email" placeholder="example@mail.ru" required />
              </div>
              <div class="workspace-field">
                <label for="phone">Телефон</label>
                <input class="input" id="phone" type="text" placeholder="+7 (999) 123-45-67" />
              </div>
              <div class="workspace-field">
                <label for="password">Пароль</label>
                <input class="input" id="password" type="password" placeholder="Минимум 8 символов" required />
              </div>
            </div>

            <div class="spacer-16"></div>
            <div class="workspace-field">
              <label for="notes">Заметки</label>
              <textarea class="input" id="notes" placeholder="Внутренняя заметка о клиенте"></textarea>
            </div>

            <div class="spacer-16"></div>
            <p id="error-msg"></p>
            <p id="success-msg"></p>
            <button type="submit" class="btn btn-primary" id="submit-btn">Создать клиента</button>
          </form>
        </section>
      </section>
    </main>

    <script type="module" src="/assets/admin-clients-create.js"></script>
  </body>
</html>
