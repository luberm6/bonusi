<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Новый клиент</title>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 720px) { .form-grid { grid-template-columns: 1fr; } }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { font-size: 13px; font-weight: 600; color: #475569; }
      textarea.input { min-height: 120px; resize: vertical; }
      #error-msg { color: #dc2626; font-size: 14px; min-height: 20px; }
      #success-msg { color: #16a34a; font-size: 15px; font-weight: 600; min-height: 20px; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <header class="glass card nav">
          <h1 class="title" style="font-size: 22px; margin: 0;">Новый клиент</h1>
          <div class="nav-links">
            <a class="link" href="/admin/clients/">Клиенты</a>
            <a class="link" href="/admin/dashboard/">← Дашборд</a>
          </div>
        </header>

        <div class="spacer-16"></div>
        <section class="glass card">
          <p class="subtitle">Создание учетной записи клиента с привязкой к backend-роли.</p>
        </section>

        <div class="spacer-16"></div>
        <section class="glass card">
          <form id="client-form">
            <div class="form-grid">
              <div class="field">
                <label for="full-name">Имя клиента</label>
                <input class="input" id="full-name" type="text" placeholder="Например, Иван Петров" />
              </div>
              <div class="field">
                <label for="email">Электронная почта</label>
                <input class="input" id="email" type="email" placeholder="client@example.com" required />
              </div>
              <div class="field">
                <label for="phone">Телефон</label>
                <input class="input" id="phone" type="text" placeholder="+7 (999) 123-45-67" />
              </div>
              <div class="field">
                <label for="password">Пароль</label>
                <input class="input" id="password" type="password" placeholder="Минимум 8 символов" required />
              </div>
            </div>

            <div class="spacer-16"></div>
            <div class="field">
              <label for="notes">Заметки</label>
              <textarea class="input" id="notes" placeholder="Внутренняя заметка о клиенте"></textarea>
            </div>

            <div class="spacer-16"></div>
            <p id="error-msg"></p>
            <p id="success-msg"></p>
            <button type="submit" class="btn btn-primary" id="submit-btn">Создать клиента</button>
          </form>
        </section>
      </section>
    </main>

    <script type="module">
      import { guard, startSessionAutoRefresh, authFetchJson } from "/assets/app.js";

      const session = guard(["admin", "super_admin"]);
      if (session) {
        startSessionAutoRefresh();

        const form = document.getElementById("client-form");
        const errorMsg = document.getElementById("error-msg");
        const successMsg = document.getElementById("success-msg");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          errorMsg.textContent = "";
          successMsg.textContent = "";
          submitBtn.disabled = true;

          try {
            const payload = {
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
              role: "client",
              fullName: document.getElementById("full-name").value.trim() || null,
              phone: document.getElementById("phone").value.trim() || null,
              notes: document.getElementById("notes").value.trim() || null,
              isActive: true
            };

            const created = await authFetchJson("/users", {
              method: "POST",
              body: payload
            });

            successMsg.innerHTML = `Клиент создан. ID: ${created.id}. <a class="link" href="/admin/clients/">Открыть список</a>`;
            form.reset();
          } catch (error) {
            errorMsg.textContent = error instanceof Error ? error.message : "Не удалось создать клиента";
          } finally {
            submitBtn.disabled = false;
          }
        });
      }
    </script>
  </body>
</html>
