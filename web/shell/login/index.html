<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centr Radius Service | Вход в систему</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .login-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: radial-gradient(circle at 50% 0%, rgba(37,99,235,0.08), transparent 50%), var(--bg);
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--glass);
        backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 24px 48px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
      }
      .login-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 36px;
        line-height: 1.1;
        font-weight: 600;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #fff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .login-subtitle {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 32px;
      }
      .login-form {
        text-align: left;
      }
      .login-form .label {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255,255,255,0.8);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        display: block;
      }
      .login-btn {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        margin-top: 16px;
        border-radius: 12px;
        font-weight: 600;
      }
      .login-logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin: 32px auto 0;
        display: block;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.1);
      }
    </style>
    <script src="/assets/config.js"></script>
    <link rel="stylesheet" href="/assets/style.css?v=10" />
  </head>
  <body>
    <main class="login-shell">
      <div class="login-card">
        <h1 class="login-title">Centr Radius Service</h1>
        <p class="login-subtitle">Войдите в систему, чтобы открыть кабинет клиента или рабочее пространство команды.</p>

        <form id="login-form" class="login-form">
          <label class="label" for="email">Электронная почта</label>
          <input class="input" id="email" type="email" placeholder="example@mail.ru" required />

          <div class="spacer-16"></div>
          <label class="label" for="password">Пароль</label>
          <input class="input" id="password" type="password" placeholder="••••••••" required />

          <p id="error" class="error" style="margin-top: 16px; text-align: center; min-height: 20px;"></p>
          
          <button class="btn btn-primary login-btn" type="submit">Войти</button>
        </form>

        <img src="/assets/logo.png" alt="Centr Radius Service Logo" class="login-logo" />
      </div>
    </main>

    <script type="module">
      import { apiLogin, apiMe, writeSession } from "/assets/app.js";

      const form = document.getElementById("login-form");
      const errorNode = document.getElementById("error");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        void (async () => {
          errorNode.textContent = "";
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!email || !password) {
            errorNode.textContent = "Введите email и пароль.";
            return;
          }

          try {
            const login = await apiLogin({ email, password });
            const me = await apiMe(login.accessToken);

            writeSession({
              userId: me.id ?? login.user?.id,
              role: me.role ?? login.user?.role,
              email: me.email ?? login.user?.email ?? email,
              accessToken: login.accessToken,
              refreshToken: login.refreshToken,
              deviceId: login.deviceId
            });
            const role = me.role ?? login.user?.role;
            window.location.href = role === "client" ? "/home/" : "/admin/dashboard/";
          } catch (error) {
            const msg = error instanceof Error ? error.message : "";
            const isNetwork =
              msg === "Load failed" ||
              msg === "Failed to fetch" ||
              msg.includes("NetworkError") ||
              msg.includes("network");
            errorNode.textContent = isNetwork
              ? "Не удалось подключиться к серверу. Проверьте соединение и попробуйте снова."
              : msg || "Не удалось выполнить вход. Проверьте данные и попробуйте ещё раз.";
          }
        })();
      });
    </script>
  </body>
</html>
