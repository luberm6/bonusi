<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoservice | Вход в систему</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
    </style>
    <script src="/assets/config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css?v=10" />
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <div class="glass card" style="max-width: 480px; margin: 40px auto 0;">
          <h1 class="title">Autoservice</h1>
          <p class="subtitle" id="subtitle">Проверяем сессию...</p>
          <div class="spacer-16"></div>
          <div class="row" id="actions"></div>
        </div>
      </section>
    </main>

    <script type="module">
      let resolved = false;

      function renderFallback(msg = "Войдите в систему, чтобы продолжить.") {
        if (resolved) return;
        resolved = true;
        const sub = document.getElementById("subtitle");
        if (sub) sub.textContent = msg;
        const actions = document.getElementById("actions");
        if (actions && !actions.children.length) {
          const a = document.createElement("a");
          a.className = "btn btn-primary";
          a.href = "/login/";
          a.textContent = "Войти";
          actions.appendChild(a);
        }
      }

      const timeoutId = setTimeout(() => {
        renderFallback();
      }, 2500);

      try {
        const { readSession } = await import("/assets/app.js");
        const session = readSession();
        clearTimeout(timeoutId);
        if (session && session.role) {
          resolved = true;
          window.location.replace(session.role === "client" ? "/home/" : "/admin/dashboard/");
        } else {
          renderFallback();
        }
      } catch (err) {
        console.error("Session check error:", err);
        clearTimeout(timeoutId);
        renderFallback();
      }
    </script>
  </body>
</html>
