/* ============================================================
   BubbleCluster — densely packed light bubbles filling the
   whole circle (no inner dark disc) per reference.
   Bubbles touching the center are slightly dimmed so the
   "65" / "бонусов" labels stay readable.
   ============================================================ */
function BubbleCluster({ size = 300, count = 220 }) {
  const bubbles = useMemo(() => {
    let s = 11;
    const rand = () => (s = (s * 9301 + 49297) % 233280) / 233280;
    const arr = [];
    const maxR = 48; // circle radius in viewBox 0..100
    for (let i = 0; i < count; i++) {
      const a = rand() * Math.PI * 2;
      // distribute roughly evenly across the disc (sqrt for area)
      const t = Math.sqrt(rand()) * maxR;
      const cx = 50 + Math.cos(a) * t;
      const cy = 50 + Math.sin(a) * t;
      const r = 1.6 + rand() * 2.4;
      // dim bubbles near center so center text reads
      const distToCenter = Math.hypot(cx - 50, cy - 50);
      const centerFade = distToCenter < 14 ? 0.18 : 1;
      const alpha = (0.45 + rand() * 0.55) * centerFade;
      arr.push({ cx, cy, r, alpha });
    }
    return arr;
  }, [count]);

  return (
    <svg viewBox="0 0 100 100" style={{position:'absolute', inset:0, width:size, height:size}}>
      <defs>
        <radialGradient id="bub" cx="35%" cy="30%" r="70%">
          <stop offset="0%"  stopColor="#e8eef2" stopOpacity="1"/>
          <stop offset="55%" stopColor="#7a848d" stopOpacity="0.9"/>
          <stop offset="100%" stopColor="#1a2026" stopOpacity="0.9"/>
        </radialGradient>
        <radialGradient id="bubHi" cx="32%" cy="28%" r="38%">
          <stop offset="0%"   stopColor="#ffffff" stopOpacity="0.95"/>
          <stop offset="100%" stopColor="#ffffff" stopOpacity="0"/>
        </radialGradient>
        {/* clip so bubbles never bleed outside the circle */}
        <clipPath id="discClip">
          <circle cx="50" cy="50" r="48"/>
        </clipPath>
        {/* soft radial fade mask so the outer edge dissolves into bg
            instead of a hard circular cut */}
        <radialGradient id="fadeMask" cx="50%" cy="50%" r="50%">
          <stop offset="0%"  stopColor="#fff" stopOpacity="1"/>
          <stop offset="70%" stopColor="#fff" stopOpacity="1"/>
          <stop offset="90%" stopColor="#fff" stopOpacity="0.55"/>
          <stop offset="100%" stopColor="#fff" stopOpacity="0"/>
        </radialGradient>
        <mask id="discMask">
          <rect x="0" y="0" width="100" height="100" fill="url(#fadeMask)"/>
        </mask>
      </defs>
      <g clipPath="url(#discClip)" mask="url(#discMask)">
        {bubbles.map((b, i) => (
          <g key={i} opacity={b.alpha}>
            <circle cx={b.cx} cy={b.cy} r={b.r} fill="url(#bub)" />
            <circle cx={b.cx - b.r*0.25} cy={b.cy - b.r*0.32} r={b.r*0.42} fill="url(#bubHi)" />
          </g>
        ))}
      </g>
    </svg>
  );
}

/* ============================================================
   PointsDial — bubble disc filling whole circle, with "65"
   and "бонусов" overlaid. White ornamental half-arc on the
   right side with "1.57 KM" label and "0 KM" above.
   ============================================================ */
function PointsDial({ size = 280, points = 65, km = 1.57, totalKm = '0 KM' }) {
  return (
    <div style={{
      position:'relative',
      width: size + 90,
      height: size + 56,
      display:'flex', alignItems:'flex-start', justifyContent:'center',
    }}>
      {/* "0 KM" top label */}
      <div style={{
        position:'absolute', top:0, left:'50%', transform:'translateX(-50%)',
        fontSize:14, letterSpacing:5, color:'rgba(255,255,255,0.85)', fontWeight:500,
        fontFamily:"'Manrope',sans-serif",
      }}>{totalKm}</div>

      {/* White ornamental arc — right side */}
      <svg
        viewBox="0 0 220 380"
        style={{
          position:'absolute', top: 22, left:'50%',
          marginLeft: -10,
          width: size/2 + 70, height: size + 36,
          pointerEvents:'none', overflow:'visible',
        }}
      >
        <defs>
          <linearGradient id="arcGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor="#ffffff" stopOpacity="0"/>
            <stop offset="18%"  stopColor="#ffffff" stopOpacity="0.85"/>
            <stop offset="50%"  stopColor="#ffffff" stopOpacity="1"/>
            <stop offset="82%"  stopColor="#ffffff" stopOpacity="0.85"/>
            <stop offset="100%" stopColor="#ffffff" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* main arc */}
        <path
          d="M 8 24 A 180 180 0 0 1 8 356"
          fill="none" stroke="url(#arcGrad)" strokeWidth="2.2" strokeLinecap="round"
        />
      </svg>

      {/* "1.57 KM" label on the arc */}
      <div className="mono" style={{
        position:'absolute', top: 26 + size/2 - 24, right: 0,
        textAlign:'left', lineHeight:1.05,
        fontFamily:"'Manrope',sans-serif",
      }}>
        <div style={{fontSize:14, fontWeight:500, color:'rgba(255,255,255,0.85)', letterSpacing:0.5}}>{km}</div>
        <div style={{fontSize:12, letterSpacing:1.5, color:'rgba(255,255,255,0.75)', fontWeight:500}}>KM</div>
      </div>

      {/* The dial — bubble cluster with NO visible ring border.
          Background is fully transparent so bubbles fade naturally
          into the screen background (per reference). */}
      <div style={{
        position:'absolute', top:26, left:'50%', transform:'translateX(-50%)',
        width:size, height:size,
      }}>
        <BubbleCluster size={size} />

        {/* Centered text overlaid on bubbles */}
        <div style={{
          position:'absolute', inset:0,
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          gap: 2,
          pointerEvents:'none',
        }}>
          <div style={{
            fontSize: size * 0.28, fontWeight:300, lineHeight:1,
            color:'#ffffff',
            fontFamily:"'Manrope',sans-serif",
            textShadow:'0 2px 12px rgba(0,0,0,0.85), 0 0 24px rgba(0,0,0,0.6)',
          }}>{points}</div>
          <div style={{
            fontSize: size * 0.05, letterSpacing:1.5, color:'rgba(255,255,255,0.85)',
            fontWeight:400, textTransform:'lowercase',
            fontFamily:"'Manrope',sans-serif",
            textShadow:'0 1px 6px rgba(0,0,0,0.9)',
          }}>бонусов</div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Classic dashboard gauge — half-circle with red needle.
   Used flanking the driver name.
   ============================================================ */
function DashGauge({ flip = false, label }) {
  return (
    <svg viewBox="0 0 60 38" width="58" height="36" style={{
      transform: flip ? 'scaleX(-1)' : 'none',
      opacity: 0.95,
    }}>
      {/* arc */}
      <path d="M 6 32 A 24 24 0 0 1 54 32" fill="none" stroke="rgba(255,255,255,0.75)" strokeWidth="1"/>
      {/* tick marks */}
      {Array.from({length:9}).map((_,i)=>{
        const a = Math.PI + (i/8)*Math.PI;
        const x1 = 30 + Math.cos(a)*22;
        const y1 = 32 + Math.sin(a)*22;
        const x2 = 30 + Math.cos(a)*19;
        const y2 = 32 + Math.sin(a)*19;
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="rgba(255,255,255,0.7)" strokeWidth="0.7"/>;
      })}
      {/* labels (E / F or C / H) */}
      <text x="5" y="36" fill="rgba(255,255,255,0.85)" fontSize="6" fontFamily="'Manrope',sans-serif" fontWeight="600" transform={flip ? 'scale(-1,1) translate(-10,0)' : ''}>
        {label[0]}
      </text>
      <text x="50" y="36" fill="rgba(255,255,255,0.85)" fontSize="6" fontFamily="'Manrope',sans-serif" fontWeight="600" transform={flip ? 'scale(-1,1) translate(-100,0)' : ''}>
        {label[1]}
      </text>
      {/* red needle */}
      <line x1="30" y1="32" x2={30 + Math.cos(Math.PI + 0.18*Math.PI)*20} y2={32 + Math.sin(Math.PI + 0.18*Math.PI)*20}
            stroke="#E63A2A" strokeWidth="1.4" strokeLinecap="round"/>
      <circle cx="30" cy="32" r="1.4" fill="#cfd6dc"/>
    </svg>
  );
}

        <div style={{
          position:'absolute', right:60, top:'50%', transform:'translateY(-50%)',
          fontSize:24, color:'rgba(255,255,255,0.6)', fontWeight:300,
        }}>+</div>

        {/* inner hub */}
        <div style={{
          position:'absolute', inset:120, borderRadius:'50%',
          background:'radial-gradient(circle at 45% 30%, #1a2128 0%, #03050a 80%)',
          boxShadow:'inset 0 0 0 1px rgba(255,255,255,0.05), inset 0 -12px 24px rgba(0,0,0,0.6)',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          {/* Generic winged emblem placeholder (NOT a real brand logo) */}
          <svg viewBox="0 0 200 80" width="180" height="72" style={{opacity:0.75}}>
            <defs>
              <linearGradient id="emb" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stopColor="#dfe6ec"/>
                <stop offset="100%" stopColor="#5e6770"/>
              </linearGradient>
            </defs>
            {/* left wing — abstract feather lines */}
            <g fill="url(#emb)">
              {Array.from({length:7}).map((_,i)=>{
                const w = 70 - i*8;
                const y = 28 + i*5;
                return <path key={i} d={`M 92 40 Q ${92-w/2} ${y-6} ${92-w} ${y+2}`} stroke="url(#emb)" strokeWidth={1.6 - i*0.1} fill="none" strokeLinecap="round"/>;
              })}
              {/* right wing mirrored */}
              {Array.from({length:7}).map((_,i)=>{
                const w = 70 - i*8;
                const y = 28 + i*5;
                return <path key={'r'+i} d={`M 108 40 Q ${108+w/2} ${y-6} ${108+w} ${y+2}`} stroke="url(#emb)" strokeWidth={1.6 - i*0.1} fill="none" strokeLinecap="round"/>;
              })}
              {/* central shield */}
              <path d="M 92 22 Q 100 18 108 22 L 108 50 Q 100 58 92 50 Z" fill="#11161c" stroke="url(#emb)" strokeWidth="1.4"/>
            </g>
          </svg>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   Menu item with thin blue underline glow
   ============================================================ */
function MenuItem({ children, hotspotX = 110 }) {
  // The reference underline image has its bright hotspot centered horizontally.
  // We size the image to ~280px wide and shift it so its center aligns with hotspotX.
  const IMG_W = 280;
  // Streak container starts at marginLeft -22 (screen left edge).
  // image-center x = hotspotX (from streak-container's left)
  // image-left = hotspotX - IMG_W/2
  return (
    <div style={{display:'flex', flexDirection:'column', gap:14, alignItems:'flex-start'}}>
      <div style={{
        fontSize:14, fontWeight:700, letterSpacing:1.6, color:'#fff', lineHeight:1.15, textTransform:'uppercase',
      }}>{children}</div>
      <div style={{
        position:'relative', width: 320, height: 24, marginLeft: -22, overflow:'visible',
      }}>
        <img
          src={UNDERLINE_DATA_URI}
          alt=""
          style={{
            position:'absolute',
            left: hotspotX - IMG_W/2,
            top:'50%',
            transform:'translateY(-50%)',
            width: IMG_W,
            height: 'auto',
            pointerEvents:'none',
          }}
        />
      </div>
    </div>
  );
}

/* ============================================================
   "начать чат" — small circular button.
   Thin orange outer ring + thin blue inner ring per reference.
   ============================================================ */
function ChatButton() {
  const SIZE = 130;
  return (
    <div style={{
      width: SIZE, height: SIZE,
      position:'relative',
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      <img
        src={RING_DATA_URI}
        alt=""
        style={{
          position:'absolute', inset:0,
          width:'100%', height:'100%',
          objectFit:'contain',
          pointerEvents:'none',
        }}
      />
      <div style={{
        position:'relative',
        fontSize:11, fontWeight:500, color:'rgba(255,255,255,0.92)',
        textAlign:'center', lineHeight:1.2,
        fontFamily:"'Manrope',sans-serif",
        textShadow:'0 1px 4px rgba(0,0,0,0.9)',
      }}>начать<br/>чат</div>
    </div>
  );
}

/* ============================================================
   Main screen
   ============================================================ */
function MainScreen() {
  return (
    <div data-screen-label="Main" style={{
      width: 390, height: 844, position:'relative', overflow:'hidden',
      background:`
        radial-gradient(ellipse 90% 55% at 50% 0%, #0d1620 0%, transparent 60%),
        linear-gradient(180deg, #060a0f 0%, #05080c 50%, #03050a 100%)
      `,
      color:'#fff', fontFamily:"'Manrope', system-ui",
    }}>
      {/* Steering wheel — drawn first so it sits behind */}
      <SteeringWheelArea/>

      {/* Top bar: MAP (left) + weather + time (right) */}
      <div style={{
        position:'absolute', top:18, left:0, right:0,
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'0 22px',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          {/* Right-turn arrow icon */}
          <svg width="34" height="26" viewBox="0 0 34 26" fill="none">
            <path d="M 2 13 L 22 13 L 22 6 L 32 13 L 22 20 L 22 13" stroke="#fff" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" fill="#fff"/>
          </svg>
          <div style={{fontSize:16, fontWeight:600, letterSpacing:2.5, color:'#fff'}}>MAP</div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          {/* sun + small cloud weather icon */}
          <svg width="26" height="22" viewBox="0 0 26 22" fill="none">
            <circle cx="9" cy="9" r="5" fill="#FFD66B"/>
            <path d="M 6 17 A 4 4 0 1 1 9 11 A 5 5 0 0 1 21 13 A 3.5 3.5 0 0 1 20 19 Z"
                  fill="#e8eef2" stroke="#aab3bc" strokeWidth="0.6"/>
          </svg>
          <div style={{fontSize:14, fontWeight:500, color:'rgba(255,255,255,0.95)', whiteSpace:'nowrap'}}>+17°C</div>
          <div style={{fontSize:14, fontWeight:500, color:'rgba(255,255,255,0.95)', marginLeft:6, whiteSpace:'nowrap'}}>12:35 PM</div>
        </div>
      </div>

      {/* Points dial */}
      <div style={{position:'absolute', top:62, left:0, right:0, display:'flex', justifyContent:'center'}}>
        <PointsDial size={250} points={65} km={'1.57'} totalKm={'0 KM'}/>
      </div>

      {/* Driver name + gauges row */}
      <div style={{position:'absolute', top:400, left:0, right:0, padding:'0 22px',
        display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <DashGauge label={['C','H']}/>
        <div style={{textAlign:'center', flex:1, minWidth:0}}>
          <div style={{fontSize:17, fontWeight:600, letterSpacing:1.2, color:'rgba(255,255,255,0.78)', whiteSpace:'nowrap'}}>АНАСТАСИЯ МИЛАНОВА</div>
          <div style={{fontSize:14, fontWeight:500, letterSpacing:1.4, color:'rgba(255,255,255,0.7)', marginTop:2, whiteSpace:'nowrap'}}>БМВ M5</div>
        </div>
        <DashGauge flip label={['E','F']}/>
      </div>

      {/* Bottom menu list (left) */}
      <div style={{
        position:'absolute', left:22, bottom:38,
        display:'flex', flexDirection:'column', gap:28,
      }}>
        <MenuItem hotspotX={130}>Записаться<br/>на ремонт</MenuItem>
        <MenuItem hotspotX={120}>История<br/>ремонта</MenuItem>
        <MenuItem hotspotX={125}>Система<br/>кешбека</MenuItem>
      </div>

      {/* Chat button (right) */}
      <div style={{position:'absolute', right:28, bottom:42}}>
        <ChatButton/>
      </div>
    </div>
  );
}

/* ============================================================
   Page
   ============================================================ */
function App() {
  return (
    <div style={{
      display:'flex', gap:48, alignItems:'flex-start', padding:'40px 60px',
    }}>
      <div style={{display:'flex', flexDirection:'column', gap:14}}>
        <div className="mono" style={{fontSize:12, color:'#9aa6b0', letterSpacing:1.5, textTransform:'uppercase'}}>Bonusi — главная</div>
        <div style={{
          width:390, height:844, borderRadius:46, overflow:'hidden',
          boxShadow:'inset 0 0 0 3px #20262c, 0 40px 80px -30px rgba(0,0,0,0.6)',
        }}>
          <MainScreen/>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
